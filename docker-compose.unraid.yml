# Variante Unraid du déploiement « Option A » (conteneur autonome).
#
# L'image est PUBLIÉE sur GHCR par la CI (.github/workflows/docker-publish.yml)
# à chaque push sur main : aucun build sur le serveur, aucun code source à
# copier. Unraid fait un simple `docker pull`.
#
# Prérequis sur le serveur Unraid :
#   1. Plugin « Docker Compose Manager » (Community Applications) : créer un
#      projet et y déposer CE fichier (renommé docker-compose.yml) + le .env
#      (basé sur .env.example).
#   2. Si le package GHCR est privé, s'authentifier une fois sur le serveur :
#        docker login ghcr.io -u tellebma
#      (mot de passe = un Personal Access Token avec la portée read:packages).
#   3. Cloner le code Pivot (branche main) dans
#        /mnt/user/appdata/pivot-discord-bot/pivot-src
#      (mise à jour possible via le plugin « User Scripts » : git pull périodique).
#
# Mise à jour du bot : Compose Down → Pull → Up depuis l'interface Unraid.
#
# Le bot n'expose AUCUN port : uniquement des connexions sortantes
# (Discord, GitHub, Anthropic). Le réseau bridge par défaut suffit.

services:
  pivot-discord-bot:
    image: ghcr.io/tellebma/pivot-discord-bot:latest
    container_name: pivot-discord-bot
    restart: unless-stopped
    init: true # PID 1 léger : signaux propres + reaping des zombies
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: Europe/Paris
      # Chemin du code Pivot À L'INTÉRIEUR du conteneur (cf. volume ci-dessous).
      ASK_REPO_PATH: /pivot
      # Clones locaux du code des PR relues (cf. volume ci-dessous).
      PR_REVIEW_WORKSPACE_DIR: /home/botuser/review-workspace
      # Config de la CLI Claude (.claude.json) rangée DANS le volume ~/.claude
      # (cf. volume 2 ci-dessous). Sans cela elle vit à la racine du HOME
      # éphémère du conteneur et disparaît à chaque recréation — la CLI refuse
      # alors de démarrer (« configuration file not found », backups orphelins).
      CLAUDE_CONFIG_DIR: /home/botuser/.claude
    volumes:
      # 1) Code applicatif Pivot (branche main), en LECTURE SEULE, pour /ask.
      - /mnt/user/appdata/pivot-discord-bot/pivot-src:/pivot:ro

      # 1 bis) Workspace de relecture : clones persistants des dépôts dont les
      #    PR sont relues (cache réutilisé entre les relectures). Comme pour
      #    ~/.claude, attribuer le dossier hôte à l'UID du conteneur :
      #    chown -R 1001:1001 /mnt/user/appdata/pivot-discord-bot/review-workspace
      - /mnt/user/appdata/pivot-discord-bot/review-workspace:/home/botuser/review-workspace

      # 2) Authentification Claude : abonnement Claude (Pro/Max) via un montage
      #    de ~/.claude (option retenue pour ce déploiement — pas de clé API ni
      #    de token dans le .env).
      #
      #    Mise en place : faire `claude login` sur une machine de confiance
      #    (ou sur l'Unraid lui-même — attention, /root n'y survit pas à un
      #    redémarrage), copier le contenu de ~/.claude dans
      #    /mnt/user/appdata/pivot-discord-bot/claude, puis l'attribuer à l'UID
      #    du conteneur (chown -R 1001:1001 — l'image publiée tourne en botuser
      #    1001, pas en nobody:users).
      #
      #    Montage en LECTURE/ÉCRITURE obligatoire : la CLI doit pouvoir
      #    rafraîchir ses jetons OAuth.
      #
      #    Alternative sans montage : définir ANTHROPIC_API_KEY (clé API,
      #    facturée à l'usage) ou CLAUDE_CODE_OAUTH_TOKEN (`claude setup-token`)
      #    dans .env, et commenter la ligne ci-dessous.
      - /mnt/user/appdata/pivot-discord-bot/claude:/home/botuser/.claude

      # 3) GitHub App « Pivot Review Bot » : clé privée pour frapper les tokens
      #    d'installation (les reviews sont publiées au nom de l'App, badge
      #    « bot »). Déposer le .pem téléchargé lors de la création de l'App :
      #      cp <app>.private-key.pem /mnt/user/appdata/pivot-discord-bot/github-app.pem
      #      chown 1001:1001 /mnt/user/appdata/pivot-discord-bot/github-app.pem
      #      chmod 600 /mnt/user/appdata/pivot-discord-bot/github-app.pem
      #    Et renseigner dans .env : GITHUB_APP_ID, GITHUB_APP_INSTALLATION_ID,
      #    GITHUB_APP_PRIVATE_KEY_PATH=/home/botuser/github-app.pem
      - /mnt/user/appdata/pivot-discord-bot/github-app.pem:/home/botuser/github-app.pem:ro

    # Garde-fous ressources (ajuster selon le serveur). La CLI Claude spawnée
    # pour /review et /ask consomme l'essentiel de la mémoire.
    mem_limit: 2g
    cpus: 2

    # Intégration à l'interface Docker d'Unraid (icône + repérage).
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: https://raw.githubusercontent.com/discordjs/guide/main/guide/images/branding/logo.svg
